#
# Parses the scripts under strict POSIX shells. shellcheck performs static
# analysis only, while dash and mksh parse each script and reject syntax the
# target shells do not accept. zshrc stays out of the list because it uses
# zsh-only constructs. The matrix shell name reaches the run block through
# an environment variable to keep the command free of template injection.
# dash ships with Ubuntu as /bin/sh, so the install runs only when the
# matrix shell is missing, sparing the dash leg a needless apt fetch.
---
name: posix
'on':
  pull_request:
    paths: &paths
      - '*.do'
      - aliases
      - app/lock
      - app/merge_history.sh
      - bash_profile
      - bashrc
      - functions
      - install
      - xinitrc
  push:
    branches: [master]
    paths: *paths
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
defaults:
  run:
    shell: sh
jobs:
  posix:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    strategy:
      matrix:
        shell: [dash, mksh]
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - env:
          SH: ${{ matrix.shell }}
        run: |
          command -v "$SH" >/dev/null || {
            sudo apt-get update
            sudo apt-get install --no-install-recommends --yes \
              "$SH"
          }
          for f in \
            ./*.do \
            ./aliases \
            ./app/lock \
            ./app/merge_history.sh \
            ./bash_profile \
            ./bashrc \
            ./functions \
            ./install \
            ./xinitrc; do
            "$SH" -n "$f"
          done
