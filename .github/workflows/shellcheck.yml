---
name: shellcheck
'on':
  pull_request:
  push:
    branches: [master]
  workflow_dispatch:
permissions:
  contents: read
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}
jobs:
  shellcheck:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v7.0.0
        with:
          persist-credentials: false
      - uses: ludeeus/action-shellcheck@2.0.0
        with:
          additional_files: >-
            aliases
            all.do
            app/lock
            app/merge_history.sh
            bash_profile
            bashrc
            clean.do
            functions
            fzf.bash
            fzf.zsh
            install
            lint.do
            xinitrc
            zshrc
          ignore_paths: >-
            ./app/z.sh
